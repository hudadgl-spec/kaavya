<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adhiparasakthi Engineering College Login</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f2f2f2;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .login-box{
            width:360px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 15px rgba(0,0,0,0.2);
            text-align:center;
        }

        .logo{
            width:100px;
            margin-bottom:15px;
        }

        h2{
            color:#8B0000;
            margin-bottom:20px;
        }

        input{
            width:100%;
            padding:12px;
            margin:10px 0;
            border:1px solid #ccc;
            border-radius:5px;
            font-size:16px;
        }

        button{
            width:100%;
            padding:12px;
            background:#8B0000;
            color:white;
            border:none;
            border-radius:5px;
            font-size:16px;
            cursor:pointer;
        }

        button:hover{
            background:#b30000;
        }
    </style>

</head>
<body>

<div class="login-box">

    <!-- College Logo -->
    <img src=" APEC.logo.png" class="logo" alt="College Logo">

    <h2>Adhiparasakthi Engineering College</h2>

    <form>
        <input type="text" placeholder="Enter Username" required>

        <input type="password" placeholder="Enter Password" required>

        <button type="submit">Login</button>
    </form>

</div>

</body>
</html>
